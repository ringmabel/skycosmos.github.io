<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dream Profile</title>

<style>
body {
    margin: 0;
    font-family: 'Pretendard', sans-serif;
    background: linear-gradient(#cfe8ff, #fefefe);
    color: #333;
}

header {
    text-align: center;
    padding: 60px 20px;
}

h1 {
    font-size: 32px;
    margin-bottom: 10px;
}

nav {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-bottom: 30px;
}

nav button {
    padding: 10px 18px;
    border: none;
    border-radius: 20px;
    background: #ffffff;
    cursor: pointer;
    transition: 0.2s;
}

nav button:hover {
    background: #d9ecff;
}

.section {
    display: none;
    max-width: 700px;
    margin: auto;
    background: white;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.05);
}

.active {
    display: block;
}

h2 {
    margin-top: 0;
}
</style>
</head>

<body>

<header>
    <h1>✦ Dream Profile ✦</h1>
    <p>나의 드림 성향 기록 공간</p>
</header>

<nav>
    <button onclick="show('home')">Home</button>
    <button onclick="show('about')">About</button>
    <button onclick="show('type')">성향</button>
    <button onclick="show('genre')">장르</button>
    <button onclick="show('note')">Note</button>
</nav>

<div id="home" class="section active">
    <h2>Welcome</h2>
    <p>이곳은 개인적인 드림 성향을 기록하는 공간입니다.</p>
</div>

<div id="about" class="section">
    <h2>About Me</h2>
    <p>여기에 자기소개 작성</p>
</div>

<div id="type" class="section">
    <h2>성향</h2>
    <p>여기에 드림 성향글 작성</p>
</div>

<div id="genre" class="section">
    <h2>장르별 성향</h2>
    <p>장르별 설명 작성</p>
</div>

<div id="note" class="section">
    <h2>Notice</h2>
    <p>주의사항 / 교류 안내</p>
</div>

<script>
function show(id) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}
</script>

</body>
</html>
